<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Islands</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-purple-950 via-black to-gray-950 text-white font-sans">

  <!-- HEADER -->
  <header class="border-b border-purple-700/40 backdrop-blur-md bg-black/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black text-purple-400">Community Islands</h1>
        <p class="text-gray-300 text-sm">Minecraft Netzwerk</p>
      </div>

      <nav class="flex gap-4 text-sm md:text-base">
        <a href="#features" class="hover:text-purple-400 transition">Features</a>
        <a href="#news" class="hover:text-purple-400 transition">News</a>
        <a href="#join" class="hover:text-purple-400 transition">Join</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="text-center py-28">
    <h2 class="text-5xl md:text-7xl font-black">
      Willkommen auf <span class="text-purple-400">Community Islands</span>
    </h2>
  </section>

  <!-- FEATURES -->
  <section id="features" class="max-w-7xl mx-auto px-6 py-24 text-center">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8">⚡ SkyPvP</div>
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8">⚡ Clans</div>
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8">⚡ Jobs</div>
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8">⚡ Events</div>
    </div>
  </section>

  <!-- NEWS -->
  <section id="news" class="bg-black/40 border-y border-white/10 py-24 text-center">
    <h2 class="text-5xl font-black text-purple-400 mb-10">Neuigkeiten</h2>

    <div class="grid md:grid-cols-3 gap-8 max-w-7xl mx-auto px-6">
      <div class="bg-white/5 p-8 rounded-3xl">Neue SkyPvP Season</div>
      <div class="bg-white/5 p-8 rounded-3xl">Community Event</div>
      <div class="bg-white/5 p-8 rounded-3xl">Clan Updates</div>
    </div>
  </section>

  <!-- JOIN -->
  <section id="join" class="text-center py-24">
    <div class="max-w-3xl mx-auto bg-purple-900/30 p-10 rounded-3xl border border-purple-500/40">

      <h2 class="text-4xl font-black">Jetzt Mitspielen</h2>

      <form id="joinForm" class="mt-8 flex flex-col gap-4 items-center">
        <input
          type="text"
          id="username"
          placeholder="Minecraft Name"
          class="px-6 py-4 rounded-2xl bg-black/40 border border-purple-500 w-full max-w-md"
        />

        <button class="px-8 py-4 rounded-2xl bg-purple-600 hover:bg-purple-500 font-bold">
          ▶ Spielen
        </button>
      </form>

    </div>
  </section>

  <!-- FULLSCREEN RICKROLL -->
  <div id="overlay" class="hidden fixed inset-0 bg-black z-[9999] flex items-center justify-center">
    <div id="player" class="w-full h-full"></div>
  </div>

  <!-- FOOTER -->
  <footer class="text-center py-10 text-gray-500 border-t border-white/10">
    © 2026 Community Islands
  </footer>

  <script>
    let player;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: 'dQw4w9WgXcQ',
        playerVars: {
          autoplay: 0,
          controls: 0,
          rel: 0,
          fs: 1,
          modestbranding: 1
        }
      });
    }

    const form = document.getElementById("joinForm");
    const overlay = document.getElementById("overlay");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      if (username.trim().length < 3) {
        alert("Bitte gültigen Namen eingeben!");
        return;
      }

      overlay.classList.remove("hidden");

      setTimeout(() => {
        if (player && player.playVideo) {
          player.unMute();
          player.setVolume(100);
          player.playVideo();
        }
      }, 500);
    });

  </script>

</body>
</html>
