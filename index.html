<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Islands</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-purple-950 via-black to-gray-950 text-white font-sans">

  <!-- HEADER -->
  <header class="border-b border-purple-700/40 backdrop-blur-md bg-black/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black text-purple-400">Community Islands</h1>
        <p class="text-gray-300 text-sm">Minecraft Netzwerk</p>
      </div>

      <nav class="flex gap-4 text-sm md:text-base">
        <a href="#features" class="hover:text-purple-400 transition">Features</a>
        <a href="#news" class="hover:text-purple-400 transition">News</a>
        <a href="#join" class="hover:text-purple-400 transition">Join</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="text-center py-28">
    <h2 class="text-5xl md:text-7xl font-black">
      Willkommen auf <span class="text-purple-400">Community Islands</span>
    </h2>
  </section>

  <!-- JOIN -->
  <section id="join" class="text-center py-20">
    <form id="joinForm" class="flex flex-col items-center gap-4">
      <input
        type="text"
        id="username"
        placeholder="Minecraft Name"
        class="px-6 py-4 rounded-2xl bg-black/40 border border-purple-500 text-white"
      />

      <button class="px-8 py-4 rounded-2xl bg-purple-600 hover:bg-purple-500 font-bold">
        ▶ Spielen
      </button>
    </form>
  </section>

  <!-- RICKROLL -->
  <div id="rickrollOverlay" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
    
    <div class="w-full max-w-4xl relative">
      
      <button onclick="closeRickroll()"
        class="absolute -top-12 right-0 bg-red-600 px-5 py-2 rounded-xl font-bold">
        ✕ Schließen
      </button>

      <div class="rounded-2xl overflow-hidden border-4 border-purple-500">
        <iframe
          id="rickVideo"
          width="100%"
          height="500"
          src=""
          allow="autoplay"
          allowfullscreen
        ></iframe>
      </div>

      <p class="text-center mt-4 text-red-300 font-bold">
        System wird geladen...
      </p>

    </div>
  </div>

  <script>
    const form = document.getElementById("joinForm");
    const overlay = document.getElementById("rickrollOverlay");
    const video = document.getElementById("rickVideo");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      if (username.trim().length < 3) {
        alert("Bitte gültigen Namen eingeben!");
        return;
      }

      // AUTOPLAY FIX: mute=1 ist wichtig
      video.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0";

      overlay.classList.remove("hidden");
    });

    function closeRickroll() {
      overlay.classList.add("hidden");
      video.src = ""; // stoppt Video komplett
    }
  </script>

</body>
</html>
